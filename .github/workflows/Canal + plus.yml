name: تحديث EPG Canal+ تلقائياً

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت الاعتماديات
        run: |
          npm install -g epg-grabber
          npm install dayjs axios puppeteer

      - name: تثبيت Chromium لـ Puppeteer
        run: |
          npx puppeteer install
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: إنشاء مجلد data
        run: mkdir -p ./data

      - name: استخراج EPG من Canal+
        run: |
          echo "🚀 بدء استخراج EPG..."
          npx epg-grabber \
            --config "./sites/canalplus.com.config.js" \
            --channels "./sites/canalplus.com_fr.channels.xml" \
            --output "./data/epg-canalplus.xml" \
            --days 2 \
            --timeout 60 \
            --delay 2000

      - name: عرض محتويات مجلد data
        run: ls -la ./data/

      - name: رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: EPG-CanalPlus
          path: ./data/epg-canalplus.xml

      - name: دفع التغييرات إلى المستودع
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ./data/
          if git diff --staged --quiet; then
            echo "✅ لا توجد تغييرات"
          else
            git commit -m "تحديث EPG [skip ci]"
            git push
          fi
