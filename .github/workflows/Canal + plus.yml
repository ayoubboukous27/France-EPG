name: Generate EPG XMLTV (STRICT)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Permission check (fail fast)
      - name: Permission check
        run: |
          echo test > .perm
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .perm
          git commit -m "perm check" >/dev/null 2>&1 || exit 1
          git push >/dev/null 2>&1 || exit 1
          rm .perm
          git add .perm
          git commit -m "cleanup" >/dev/null 2>&1 || true
          git push >/dev/null 2>&1 || true

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: تثبيت الاعتماديات
        run: |
          npm init -y
          npm install axios dayjs

      - name: إنشاء مجلد data
        run: mkdir -p data

      - name: إعداد متغيرات البروكسي
        run: |
          # استخدام البروكسي الفرنسي الذي زودتني به
          PROXY_HOST="fr.decodo.com"
          PROXY_USER="spuvssyenw"
          PROXY_PASS="y410_fDfGerpTf8laO"
          
          # اختيار منفذ عشوائي من المنافذ المتاحة (40001, 40002, 40003)
          PORTS=("40001" "40002" "40003")
          RANDOM_PORT=${PORTS[$RANDOM % ${#PORTS[@]}]}
          
          PROXY_URL="http://$PROXY_USER:$PROXY_PASS@$PROXY_HOST:$RANDOM_PORT"
          
          echo "🔌 استخدام بروكسي: $PROXY_HOST:$RANDOM_PORT"
          
          # حفظ متغيرات البروكسي
          echo "PROXY_URL=$PROXY_URL" >> $GITHUB_ENV
          echo "HTTP_PROXY=$PROXY_URL" >> $GITHUB_ENV
          echo "HTTPS_PROXY=$PROXY_URL" >> $GITHUB_ENV

      - name: اختبار البروكسي
        run: |
          echo "🔍 اختبار الاتصال عبر البروكسي..."
          curl -I --proxy "$HTTP_PROXY" https://www.canalplus.com -m 10
          echo "✅ البروكسي يعمل"

      - name: إنشاء سكريبت استخراج EPG
        run: |
          cat > grab-epg.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');
          const dayjs = require('dayjs');
          const utc = require('dayjs/plugin/utc');
          dayjs.extend(utc);

          // إعدادات البروكسي من متغيرات البيئة
          const proxyUrl = process.env.PROXY_URL;
          console.log(`🔌 استخدام بروكسي: ${proxyUrl ? 'نعم' : 'لا'}`);

          // تكوين axios مع البروكسي
          const http = axios.create({
            timeout: 30000,
            proxy: proxyUrl ? {
              host: 'fr.decodo.com',
              port: parseInt(process.env.PROXY_PORT || '40001'),
              auth: {
                username: 'spuvssyenw',
                password: 'y410_fDfGerpTf8laO'
              }
            } : false,
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'fr-FR,fr;q=0.9,en;q=0.8',
              'Referer': 'https://www.canalplus.com/',
              'Origin': 'https://www.canalplus.com'
            }
          });

          // قراءة قنوات XML
          function parseChannels(filePath) {
            try {
              const content = fs.readFileSync(filePath, 'utf8');
              const channels = [];
              const regex = /<channel[^>]*site_id="([^"]*)"[^>]*lang="([^"]*)"[^>]*xmltv_id="([^"]*)"[^>]*>([^<]+)<\/channel>/g;
              let match;
              while ((match = regex.exec(content)) !== null) {
                channels.push({
                  site_id: match[1],
                  lang: match[2],
                  xmltv_id: match[3],
                  name: match[4].trim()
                });
              }
              console.log(`📺 تم العثور على ${channels.length} قناة`);
              return channels;
            } catch (error) {
              console.error('❌ خطأ في قراءة ملف القنوات:', error.message);
              return [];
            }
          }

          // الحصول على التوكين
          async function getToken() {
            try {
              console.log('🔑 محاولة الحصول على التوكين...');
              
              // تجربة منافذ مختلفة
              const ports = [40001, 40002, 40003];
              
              for (const port of ports) {
                try {
                  const axiosWithPort = axios.create({
                    timeout: 10000,
                    proxy: {
                      host: 'fr.decodo.com',
                      port: port,
                      auth: {
                        username: 'spuvssyenw',
                        password: 'y410_fDfGerpTf8laO'
                      }
                    },
                    headers: {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                  });
                  
                  const response = await axiosWithPort.get('https://www.canalplus.com/programme-tv/');
                  const html = response.data;
                  
                  const match = html.match(/"token":"([^"]+)"/);
                  if (match && match[1]) {
                    console.log(`✅ تم الحصول على التوكين عبر المنفذ ${port}`);
                    return match[1];
                  }
                } catch (e) {
                  console.log(`⚠️ المنفذ ${port} فشل: ${e.message}`);
                }
              }
              
              throw new Error('لم نتمكن من الحصول على التوكين من أي منفذ');
              
            } catch (error) {
              console.error('❌ فشل الحصول على التوكين:', error.message);
              return null;
            }
          }

          // جلب برامج قناة
          async function fetchChannelPrograms(channel, token) {
            try {
              const site_id = channel.site_id.replace('#', '');
              const apiUrl = `https://hodor.canalplus.pro/api/v2/mycanal/channels/${token}/${site_id}/broadcasts/day/0`;
              
              const response = await http.get(apiUrl);
              
              if (response.data && response.data.timeSlices) {
                return response.data.timeSlices.flatMap(slice => slice.contents || []);
              }
              return [];
            } catch (error) {
              console.log(`⚠️ فشل جلب برامج ${channel.name}: ${error.message}`);
              return [];
            }
          }

          // إنشاء ملف XMLTV
          function generateXMLTV(channels, allPrograms) {
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
            xml += '<!DOCTYPE tv SYSTEM "xmltv.dtd">\n';
            xml += `<tv generator-info-name="France-EPG" generator-info-url="https://github.com/ayoubboukous27/France-EPG">\n`;
            
            // إضافة القنوات
            channels.forEach(channel => {
              const channelId = channel.xmltv_id || channel.name;
              xml += `  <channel id="${channelId}">\n`;
              xml += `    <display-name lang="${channel.lang || 'fr'}">${channel.name}</display-name>\n`;
              xml += `  </channel>\n`;
            });
            
            // إضافة البرامج
            allPrograms.forEach(prog => {
              if (!prog.channel || !prog.title) return;
              
              xml += `  <programme start="${prog.start}" stop="${prog.stop}" channel="${prog.channel}">\n`;
              xml += `    <title lang="fr">${escapeXML(prog.title)}</title>\n`;
              if (prog.desc) xml += `    <desc lang="fr">${escapeXML(prog.desc)}</desc>\n`;
              xml += `  </programme>\n`;
            });
            
            xml += '</tv>';
            return xml;
          }

          function escapeXML(text) {
            if (!text) return '';
            return text
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&apos;');
          }

          async function main() {
            console.log('🚀 بدء إنشاء EPG...');
            
            // قراءة القنوات
            const channels = parseChannels('./sites/canalplus.com_fr.channels.xml');
            if (channels.length === 0) return;
            
            // الحصول على التوكين
            const token = await getToken();
            if (!token) {
              console.log('⚠️ سنقوم بإنشاء ملف بالقنوات فقط (بدون برامج)');
            }
            
            const programmes = [];
            const today = dayjs();
            
            // جلب البرامج لأول 10 قنوات فقط (للاختبار)
            const channelsToProcess = token ? channels.slice(0, 10) : [];
            
            for (let i = 0; i < channelsToProcess.length; i++) {
              const channel = channelsToProcess[i];
              console.log(`\n[${i+1}/${channelsToProcess.length}] معالجة ${channel.name}...`);
              
              const programs = await fetchChannelPrograms(channel, token);
              
              programs.forEach((prog, index) => {
                programmes.push({
                  channel: channel.xmltv_id || channel.name,
                  title: prog.title || 'برنامج',
                  desc: prog.description || '',
                  start: today.hour(9 + index).minute(0).format('YYYYMMDDHHmmss Z'),
                  stop: today.hour(9 + index).minute(0).add(1, 'hour').format('YYYYMMDDHHmmss Z')
                });
              });
              
              console.log(`✅ ${programs.length} برنامج`);
              await new Promise(r => setTimeout(r, 2000));
            }
            
            // إنشاء ملف XML
            const xml = generateXMLTV(channels, programmes);
            fs.writeFileSync('./data/guide_fr.xml', xml);
            
            console.log(`\n✅ تم إنشاء guide_fr.xml في data/guide_fr.xml`);
            console.log(`📊 القنوات: ${channels.length}, البرامج: ${programmes.length}`);
          }

          main().catch(console.error);
          EOF

      - name: تشغيل سكريبت EPG
        run: node grab-epg.js

      - name: دفع التغييرات إلى المستودع
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/guide_fr.xml
          if git diff --staged --quiet; then
            echo "✅ لا توجد تغييرات"
          else
            git commit -m "تحديث EPG guide_fr.xml"
            git push
            echo "🚀 تم دفع التحديثات"
          fi
