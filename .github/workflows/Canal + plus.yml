name: تحديث EPG Canal+ تلقائياً

on:
  schedule:
    - cron: '0 3 * * *'  # يعمل يومياً في 03:00 UTC
  workflow_dispatch:      # للتشغيل اليدوي

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: عرض هيكل المجلدات
        run: |
          echo "📂 محتويات المجلد الرئيسي:"
          ls -la
          echo "📂 محتويات مجلد sites/:"
          ls -la sites/ || echo "⚠️ مجلد sites غير موجود"

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت الاعتماديات
        run: |
          npm install -g epg-grabber
          npm install dayjs axios

      - name: إنشاء مجلد data
        run: mkdir -p ./data

      - name: استخراج EPG من Canal+
        run: |
          echo "🚀 بدء استخراج EPG..."
          npx epg-grabber \
            --config "./sites/canalplus.com.config.js" \
            --channels "./sites/canalplus.com_fr.channels.xml" \
            --output "./data/epg-canalplus.xml" \
            --days 2 \
            --timeout 60 \
            --delay 1000

      - name: ضغط ملف EPG
        run: |
          if [ -f "./data/epg-canalplus.xml" ]; then
            gzip -c ./data/epg-canalplus.xml > ./data/epg-canalplus.xml.gz
            echo "✅ تم ضغط الملف بنجاح"
          else
            echo "⚠️ ملف EPG غير موجود للضغط"
          fi
        continue-on-error: true

      - name: عرض محتويات مجلد data
        run: |
          echo "📂 محتويات مجلد data:"
          ls -la ./data/ || echo "⚠️ مجلد data فارغ"

      - name: رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: EPG-CanalPlus
          path: |
            ./data/epg-canalplus.xml
            ./data/epg-canalplus.xml.gz
          if-no-files-found: warn

      - name: دفع EPG الجديد إلى المستودع
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ./data/
          if git diff --staged --quiet; then
            echo "✅ لا توجد تغييرات لدفعها"
          else
            git commit -m "تحديث تلقائي لملف EPG في مجلد data [skip ci]"
            git push
            echo "🚀 تم دفع التغييرات بنجاح"
          fi
