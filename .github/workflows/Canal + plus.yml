# .github/workflows/update-epg.yml
name: تحديث EPG Canal+ تلقائياً

on:
  schedule:
    - cron: '0 3 * * *'  # يعمل يومياً في 03:00 UTC
  workflow_dispatch:      # للتشغيل اليدوي

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت الاعتماديات
        run: npm install epg-grabber dayjs axios

      # ✨ خطوة جديدة: التأكد من وجود مجلد data
      - name: إنشاء مجلد data إذا لم يكن موجوداً
        run: mkdir -p ./data

      # ✨ تم تغيير مسار الإخراج إلى data/
      - name: استخراج EPG من Canal+
        run: |
          npx epg-grabber \
            --config ./canalplus.com.config.js \
            --channels ./canalplus.com_fr.channels.xml \
            --output ./data/epg-canalplus.xml \
            --days 2

      # ✨ تم تغيير مسار الضغط أيضاً
      - name: ضغط ملف EPG
        run: gzip -c ./data/epg-canalplus.xml > ./data/epg-canalplus.xml.gz

      # ✨ رفع المخرجات من مجلد data
      - name: رفع المخرجات (EPG)
        uses: actions/upload-artifact@v4
        with:
          name: EPG-CanalPlus
          path: |
            ./data/epg-canalplus.xml
            ./data/epg-canalplus.xml.gz

      # (اختياري) دفع التغييرات إلى المستودع
      # ملاحظة: هذا الخيار سيضيف مجلد data إلى الريبو
      - name: دفع EPG الجديد إلى المستودع
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ./data/
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي لملف EPG في مجلد data"
          git push
        # إذا كنت لا تريد الدفع التلقائي، علّق على الأسطر أعلاه بإضافة # في بدايتها
