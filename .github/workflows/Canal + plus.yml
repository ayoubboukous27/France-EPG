# .github/workflows/update-epg.yml
name: تحديث EPG Canal+ تلقائياً

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: عرض هيكل المجلدات (للتأكيد)
        run: |
          echo "📂 محتويات المجلد الرئيسي:"
          ls -la
          echo "📂 محتويات مجلد sites/:"
          ls -la sites/ || echo "مجلد sites غير موجود"

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت الاعتماديات
        run: npm install epg-grabber dayjs axios

      - name: إنشاء مجلد data
        run: mkdir -p ./data

      # ✅ المسارات الصحيحة الآن (مع sites/)
      - name: استخراج EPG من Canal+
        run: |
          npx epg-grabber \
            --config "./sites/canalplus.com.config.js" \
            --channels "./sites/canalplus.com_fr.channels.xml" \
            --output "./data/epg-canalplus.xml" \
            --days 2

      - name: ضغط ملف EPG
        run: gzip -c ./data/epg-canalplus.xml > ./data/epg-canalplus.xml.gz
        continue-on-error: true

      - name: رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: EPG-CanalPlus
          path: |
            ./data/epg-canalplus.xml
            ./data/epg-canalplus.xml.gz

      # دفع التغييرات إلى المستودع (اختياري)
      - name: دفع EPG الجديد إلى المستودع
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ./data/
          if git diff --staged --quiet; then
            echo "لا توجد تغييرات"
          else
            git commit -m "تحديث EPG في مجلد data [skip ci]"
            git push
          done
