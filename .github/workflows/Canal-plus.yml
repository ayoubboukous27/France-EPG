name: CanalPlus France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # كل يوم 03:00 UTC

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Create Data folder
        run: mkdir -p Data

      - name: Grab Canal+ France EPG
        run: |
          cd epg
          TZ=Europe/Paris npm run grab --- \
            --site=canalplus.com \
            --channels=sites/canalplus.com/canalplus.com_fr.channels.xml \
            --days=7 \
            --output=../Data/guide_canalplus_fr.xml

      - name: Upload EPG artifact
        uses: actions/upload-artifact@v4
        with:
          name: guide_canalplus_fr
          path: Data/guide_canalplus_fr.xml
