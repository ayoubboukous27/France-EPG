name: Grab France EPG (programme-tv.org)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # يومياً 04:00 UTC

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Create Data folder
        run: mkdir -p Data

      - name: Grab EPG from programme-tv.org
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --site=programme-tv.org \
            --days=7 \
            --output=../Data/guide_programme_org.xml

      - name: Commit and push EPG
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Data/guide_programme_org.xml
          git commit -m "Update programme-tv.org EPG" || echo "No changes"
          git push
