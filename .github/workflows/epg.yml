name: France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # كل يوم 03:00 UTC

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install system deps
        run: sudo apt-get update

      - name: Run grab script
        run: |
          chmod +x scripts/grab_france_epg.sh
          ./scripts/grab_france_epg.sh

      - name: Commit & Push EPG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add epg_france.xml
          git commit -m "update france epg" || echo "No changes"
          git push
