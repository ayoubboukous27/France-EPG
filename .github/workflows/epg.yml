name: France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # يوميًا 03:00 UTC (04:00 فرنسا)

permissions:
  contents: write

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Create Data folder
        run: mkdir -p Data

      - name: Grab France EPG (programme-tv.net)
        run: |
          cd epg
          npm run grab --- \
            --site=programme-tv.net \
            --days=7 \
            --timezone=Europe/Paris \
            --output=../Data/guide_france.xml

      - name: Commit & Push EPG
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add Data/guide_france.xml
          git commit -m "Update France EPG" || echo "No changes to commit"
          git push
