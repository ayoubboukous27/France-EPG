name: France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  grab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d epg ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          fi

      - name: Install dependencies
        working-directory: epg
        run: npm install

      - name: Grab France EPG
        working-directory: epg
        run: |
          npx tsx scripts/commands/epg/grab.ts \
            --site=programme-tv.net \
            --days=7 \
            --output=guide_france.xml

      - name: Upload EPG
        uses: actions/upload-artifact@v4
        with:
          name: guide_france
          path: epg/guide_france.xml
