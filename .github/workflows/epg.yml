name: France EPG (programme-tv.net)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # يوميًا 03:00 UTC

permissions:
  contents: write

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Create Data folder
        run: mkdir -p Data

      - name: Grab EPG from programme-tv.net
        run: |
          cd epg
          TZ=Europe/Paris npx tsx scripts/commands/epg/grab.ts \
            --site=programme-tv.net \
            --days=7 \
            --output=../Data/guide_france.xml

      - name: Verify XML exists
        run: |
          ls -lh Data
          test -f Data/guide_france.xml

      - name: Commit and push XML to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Data/guide_france.xml
          git commit -m "Update France EPG (programme-tv.net)" || echo "No changes to commit"
          git push
