name: France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # كل يوم 03:00 UTC

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Create Data folder
        run: mkdir -p Data

      - name: Grab France EPG (programme-tv.net)
        run: |
          cd epg
          TZ=Europe/Paris npm run grab --- \
            --site=programme-tv.net \
            --days=7 \
            --output=../Data/guide_france.xml

      - name: Upload EPG artifact
        uses: actions/upload-artifact@v4
        with:
          name: guide_france
          path: Data/guide_france.xml
