name: Generate France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip ca-certificates

      - name: Extract WebGrab++
        run: |
          mkdir -p .wg++
          tar -xzf WebGrabPlus_5.5_install.tar.gz -C .wg++

      - name: Disable internet check
        run: |
          sed -i 's/<checkinternet>yes/<checkinternet>no/g' webgrab/WebGrab++.config.xml

      - name: Run WebGrab++
        run: |
          chmod +x .wg++/run.net.sh
          cd webgrab
          ../.wg++/run.net.sh

      - name: Commit EPG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add epg.xml
          git commit -m "Update EPG" || echo "No changes"
          git push
