name: Generate France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # يوميًا 03:00 UTC

jobs:
  webgrab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install .NET Runtime
        run: |
          sudo apt update
          sudo apt install -y dotnet-runtime-9.0

      - name: Extract WebGrab+Plus
        run: |
          tar -xzf WebGrabPlus_5.5_install.tar.gz
          chmod +x run.net.sh

      - name: Copy WebGrab config & files
        run: |
          cp webgrab/WebGrab++.config.xml .
          cp -r webgrab/siteini.pack .
          cp webgrab/channels/*.xml .

      - name: Run WebGrab+Plus
        run: |
          bash run.net.sh

      - name: Commit EPG result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add epg.xml
          git commit -m "Update EPG" || echo "No changes"
          git push
