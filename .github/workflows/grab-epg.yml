name: Generate France EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # يوميًا 03:00 UTC

jobs:
  webgrab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET Runtime 9.0
        run: |
          sudo apt update
          sudo apt install -y wget apt-transport-https
          wget https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt update
          sudo apt install -y dotnet-runtime-9.0

      - name: Extract WebGrab+Plus
        run: |
          tar -xzf WebGrabPlus_5.5_install.tar.gz
          chmod +x .wg++/run.net.sh

      - name: Copy WebGrab configuration
        run: |
          cp webgrab/WebGrab++.config.xml .
          cp -r webgrab/siteini.pack .
          cp webgrab/channels/*.xml .

      - name: Run WebGrab+Plus
        run: |
          ./.wg++/run.net.sh

      - name: Commit EPG output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add epg.xml
          git commit -m "Update EPG" || echo "No changes to commit"
          git push
